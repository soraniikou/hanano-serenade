<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花のセレナーデ — Hanano Serenade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf9f6; overflow: hidden; font-family: 'Georgia', serif; }
  canvas { display: block; width: 100vw; height: 100vh; background: transparent; }

  #ui {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 10;
  }

  #startBtn {
    background: transparent;
    border: 1.5px solid rgba(160, 100, 80, 0.5);
    color: rgba(120, 70, 60, 0.85);
    font-family: 'Georgia', serif; font-size: 13px;
    letter-spacing: 0.18em; padding: 10px 28px;
    border-radius: 40px; cursor: pointer; transition: all 0.4s ease;
  }
  #startBtn:hover { background: rgba(160, 100, 80, 0.08); }
  #startBtn.active { animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  #flowerCount { font-size: 11px; letter-spacing: 0.14em; color: rgba(140,100,80,0.55); display: none; }

  #volumeBar { width: 100px; height: 2px; background: rgba(160,100,80,0.15); border-radius: 2px; overflow: hidden; display: none; }
  #volumeFill { height: 100%; width: 0%; background: linear-gradient(90deg, rgba(200,130,100,0.6), rgba(240,160,120,0.9)); transition: width 0.05s ease; }

  #hint { font-size: 11px; letter-spacing: 0.12em; color: rgba(140,100,80,0.45); }

  /* モーダル */
  #bouquetModal {
    display: none; position: fixed; inset: 0;
    background: rgba(250,245,240,0.93);
    backdrop-filter: blur(14px); z-index: 100;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 24px; padding: 40px 28px;
  }
  #bouquetModal.show { display: flex; animation: fadeIn 0.9s ease; }

  #modalTitle { font-size: 14px; letter-spacing: 0.24em; color: rgba(120,70,60,0.75); }

  #poemBox {
    max-width: 320px; text-align: center;
    font-size: 19px; line-height: 2.2;
    color: rgba(80,45,35,0.88); letter-spacing: 0.07em;
    min-height: 80px;
  }

  .modal-btn {
    background: transparent;
    border: 1.5px solid rgba(160,100,80,0.45);
    color: rgba(120,70,60,0.8);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.16em; padding: 10px 22px;
    border-radius: 40px; cursor: pointer; transition: all 0.3s;
  }
  .modal-btn:hover { background: rgba(160,100,80,0.08); }
  #btnRow { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  #shareHint { font-size: 10px; color: rgba(160,110,90,0.5); letter-spacing: 0.1em; text-align: center; max-width: 280px; line-height: 1.8; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <button id="startBtn">マイクを起動する</button>
  <div id="volumeBar"><div id="volumeFill"></div></div>
  <div id="flowerCount">🌼 <span id="countNum">0</span> / 12</div>
  <div id="hint">声を出すと花が咲きます</div>
</div>

<div id="bouquetModal">
  <div id="modalTitle"></div>
  <div id="poemBox"></div>
  <div id="btnRow">
    <button class="modal-btn" id="shareBtn">📋 詩をコピーして贈る</button>
    <button class="modal-btn" id="restartBtn">もう一度咲かせる</button>
  </div>
  <div id="shareHint">コピーした詩をLINEやメッセージで<br>大切な人に送ってみてください</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const volumeBar = document.getElementById('volumeBar');
const volumeFill = document.getElementById('volumeFill');
const flowerCountEl = document.getElementById('flowerCount');
const countNumEl = document.getElementById('countNum');
const bouquetModal = document.getElementById('bouquetModal');
const poemBox = document.getElementById('poemBox');
const shareBtn = document.getElementById('shareBtn');
const restartBtn = document.getElementById('restartBtn');

let width, height, analyser, dataArray;
let volume = 0, smoothVolume = 0;
let baseHue = Math.random() * 360;
let isRunning = false;
let flowerCount = 0;
const TARGET = 12;
let voiceLog = [];
let currentPoem = '';
let bouquetShown = false;
let lastFlowerTime = 0;

// 背景グラデーション用（マイク起動から18秒でクリーム→淡いピンク）
let bgStartTime = null;
const BG_DURATION = 18000;
const bgFrom = { h: 30,  s: 20, l: 97 };
const bgTo   = { h: 340, s: 55, l: 94 };
let currentBg = { ...bgFrom };

// ==========================================
// 詩のプール（Kenshiさんの詩 + Claudeの詩）
// 声の強さ(soft/medium/strong)で分類
// ==========================================
const poems = {
  soft: [
    // Kenshiさんの詩
    'あなたの声を聴かせて',
    'その美しい声が\n大好きです',
    // Claudeの詩
    'ささやくような声が\n白い花になって\n静かに咲いた',
    '小さな声でも\n花は咲く\nあなたのために',
    'そっと息を吐くように\n花びらが\n一枚ずつ舞いおちた',
  ],
  medium: [
    // Kenshiさんの詩
    'あなただけの人生の花が\n満開になりますよう',
    '色とりどりの人生を',
    '受け取ってください\nあなたのための花です',
    'ずっと側にいさせて',
    'ずっと側にいられますように',
    '不安があるのは\n生きてるからだよ',
    // Claudeの詩
    'あなたの声が\nここで花になった\nそっと、誰かに届きますように',
    '声に色があるなら\nこんなにも美しい\n花になるだろう',
    'その声が庭を作った\n今日だけの\nあなたの庭を',
    '言葉にならなくていい\n声だけで\n十分に美しい',
  ],
  strong: [
    // Claudeの詩
    'あなたの声は\nあなたの希望になる\n強く、美しく',
    '叫んでもいい\nその声が\n赤い花になる',
    'その声は\n大輪の花\n誰かの心に咲く',
    'その思いが\n花になって\nあなたを染めた',
  ]
};

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, width, height);
}
window.addEventListener('resize', resize);
resize();

startBtn.addEventListener('click', async () => {
  if (isRunning) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.85;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    isRunning = true;
    bgStartTime = Date.now();
    startBtn.textContent = '🎤 聴いています';
    startBtn.classList.add('active');
    volumeBar.style.display = 'block';
    flowerCountEl.style.display = 'block';
    loop();
  } catch (e) {
    startBtn.textContent = 'マイクを許可してください';
  }
});

function getVolume() {
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 3; i < 36; i++) sum += dataArray[i];
  return sum / 33 / 255;
}

function loop() {
  requestAnimationFrame(loop);
  volume = getVolume();
  smoothVolume += (volume - smoothVolume) * 0.25;
  volumeFill.style.width = Math.min(smoothVolume * 500, 100) + '%';

  // 背景色を18秒かけてクリーム→淡いピンクにグラデーション（body直接変更）
  if (bgStartTime) {
    const elapsed = Math.min(Date.now() - bgStartTime, BG_DURATION);
    const t = elapsed / BG_DURATION;
    currentBg.h = bgFrom.h + (bgTo.h - bgFrom.h) * t;
    currentBg.s = bgFrom.s + (bgTo.s - bgFrom.s) * t;
    currentBg.l = bgFrom.l + (bgTo.l - bgFrom.l) * t;
    document.body.style.background = `hsl(${currentBg.h}, ${currentBg.s}%, ${currentBg.l}%)`;
  }

  // canvasは透明な薄膜だけ（花をゆっくり消すため）
  ctx.fillStyle = 'rgba(255,255,255,0.006)';
  ctx.fillRect(0, 0, width, height);

  // 閾値を0.15に上げて環境音を無視
  if (smoothVolume > 0.15 && !bouquetShown) {
    baseHue = (baseHue + smoothVolume * 180) % 360;
    const now = Date.now();
    if (now - lastFlowerTime > 1050) {
      lastFlowerTime = now;
      const hueOffset = Math.random() < 0.2 ? 55 : 0;
      const flowerHue = (baseHue + hueOffset) % 360;
      const x = Math.random() * width;
      const y = Math.random() * height * 0.82;
      const size = map(smoothVolume, 0.15, 0.5, 35, 150) * (0.7 + Math.random() * 1.2);
      drawRose(x, y, size, flowerHue, smoothVolume);
      voiceLog.push({ volume: smoothVolume, hue: flowerHue });
      flowerCount++;
      countNumEl.textContent = flowerCount;
      if (flowerCount >= TARGET) {
        bouquetShown = true;
        setTimeout(showBouquet, 800);
      }
    }
  }
}

function drawRose(x, y, s, h, v) {
  ctx.save();
  ctx.translate(x, y);
  const layers = Math.floor(map(v, 0.08, 0.5, 3, 7));
  for (let layer = 0; layer < layers; layer++) {
    const petalsInLayer = 5 + layer * 2;
    const layerRadius = s * 0.15 * (layer + 1);
    const offset = layer * 0.4;
    for (let p = 0; p < petalsInLayer; p++) {
      const angle = (p / petalsInLayer) * Math.PI * 2 + offset;
      const px = Math.cos(angle) * layerRadius * 0.5;
      const py = Math.sin(angle) * layerRadius * 0.5;
      const pH = (h + layer * 8 + p * 2) % 360;
      const sat = map(layer, 0, layers, 85, 45);
      const bri = map(layer, 0, layers, 55, 82);
      const alpha = map(layer, 0, layers, 0.7, 0.25);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle + Math.PI / 2);
      const pw = layerRadius * map(layer, 0, layers, 0.55, 0.75);
      const ph2 = pw * map(layer, 0, layers, 1.6, 1.2);
      ctx.beginPath();
      ctx.moveTo(0, -ph2/2);
      ctx.bezierCurveTo( pw/2,-ph2/4,  pw/2, ph2/4, 0, ph2/2);
      ctx.bezierCurveTo(-pw/2, ph2/4, -pw/2,-ph2/4, 0,-ph2/2);
      ctx.fillStyle = `hsla(${pH},${sat}%,${bri}%,${alpha})`;
      ctx.strokeStyle = `hsla(${pH},${sat-10}%,${bri-15}%,${alpha*0.4})`;
      ctx.lineWidth = 0.6;
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${(h+30)%360},70%,75%,0.9)`;
  ctx.fill();
  ctx.restore();
}

function showBouquet() {
  bouquetModal.classList.add('show');

  const avgVol = voiceLog.reduce((s, l) => s + l.volume, 0) / voiceLog.length;
  let category;
  if (avgVol < 0.12) category = 'soft';
  else if (avgVol < 0.22) category = 'medium';
  else category = 'strong';

  const pool = poems[category];
  let poem;
  do {
    poem = pool[Math.floor(Math.random() * pool.length)];
  } while (poem === currentPoem && pool.length > 1);

  currentPoem = poem;
  poemBox.innerHTML = poem.replace(/\n/g, '<br>');
}

// コピーボタン：3ステップで案内
let shareTimer1, shareTimer2;
shareBtn.addEventListener('click', () => {
  if (!currentPoem) return;

  const text = `🌹 花のセレナーデ\n\n${currentPoem}\n\nhttps://hanano-serenade.vercel.app`;
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });

  // タイマーリセット（連打対策）
  clearTimeout(shareTimer1);
  clearTimeout(shareTimer2);

  // ステップ1：コピー完了（緑色）
  shareBtn.textContent = '✓ コピーしました';
  shareBtn.style.borderColor = 'rgba(100, 160, 100, 0.6)';
  shareBtn.style.color = 'rgba(60, 120, 60, 0.85)';

  // ステップ2：LINE案内（2秒後）
  shareTimer1 = setTimeout(() => {
    shareBtn.textContent = '💌 LINEを開いて貼り付けてね';
    shareBtn.style.borderColor = 'rgba(160, 100, 80, 0.45)';
    shareBtn.style.color = 'rgba(120, 70, 60, 0.8)';
  }, 4000);

  // ステップ3：元に戻す（5秒後）
  shareTimer2 = setTimeout(() => {
    shareBtn.textContent = '📋 詩をコピーして贈る';
  }, 9000);
});

restartBtn.addEventListener('click', () => {
  bouquetModal.classList.remove('show');
  bouquetShown = false; flowerCount = 0; voiceLog = [];
  countNumEl.textContent = 0;
  poemBox.innerHTML = '';
  currentBg = { ...bgFrom };
  bgStartTime = Date.now();
  document.body.style.background = `hsl(${bgFrom.h}, ${bgFrom.s}%, ${bgFrom.l}%)`;
  ctx.clearRect(0, 0, width, height);
  baseHue = Math.random() * 360;
  // ボタンを元の状態に戻す
  clearTimeout(shareTimer1);
  clearTimeout(shareTimer2);
  shareBtn.textContent = '📋 詩をコピーして贈る';
  shareBtn.style.borderColor = '';
  shareBtn.style.color = '';
});

function map(v, a, b, c, d) { return c + (d-c)*((v-a)/(b-a)); }
</script>
</body>
</html>
