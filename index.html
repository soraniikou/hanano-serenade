<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花のセレナーデ — Hanano Serenade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf9f6; overflow: hidden; font-family: 'Georgia', serif; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 10;
  }

  #startBtn {
    background: transparent;
    border: 1.5px solid rgba(160, 100, 80, 0.5);
    color: rgba(120, 70, 60, 0.85);
    font-family: 'Georgia', serif; font-size: 13px;
    letter-spacing: 0.18em; padding: 10px 28px;
    border-radius: 40px; cursor: pointer; transition: all 0.4s ease;
  }
  #startBtn:hover { background: rgba(160, 100, 80, 0.08); }
  #startBtn.active { animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  #flowerCount {
    font-size: 11px; letter-spacing: 0.14em;
    color: rgba(140,100,80,0.55); display: none;
  }
  #volumeBar {
    width: 100px; height: 2px;
    background: rgba(160,100,80,0.15); border-radius: 2px;
    overflow: hidden; display: none;
  }
  #volumeFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, rgba(200,130,100,0.6), rgba(240,160,120,0.9));
    transition: width 0.05s ease;
  }
  #hint { font-size: 11px; letter-spacing: 0.12em; color: rgba(140,100,80,0.45); }

  /* モーダル */
  #bouquetModal {
    display: none; position: fixed; inset: 0;
    background: rgba(250,245,240,0.93);
    backdrop-filter: blur(14px); z-index: 100;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 22px; padding: 40px 28px;
  }
  #bouquetModal.show { display: flex; animation: fadeIn 0.9s ease; }

  #modalTitle {
    font-size: 14px; letter-spacing: 0.24em;
    color: rgba(120,70,60,0.75);
  }
  #poemBox {
    max-width: 320px; text-align: center;
    font-size: 18px; line-height: 2.1;
    color: rgba(80,45,35,0.88); letter-spacing: 0.07em;
    min-height: 80px;
  }
  #poemLoading {
    font-size: 11px; letter-spacing: 0.2em;
    color: rgba(160,110,90,0.6); animation: pulse 1.5s infinite;
  }
  .modal-btn {
    background: transparent;
    border: 1.5px solid rgba(160,100,80,0.45);
    color: rgba(120,70,60,0.8);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.16em; padding: 10px 22px;
    border-radius: 40px; cursor: pointer; transition: all 0.3s;
  }
  .modal-btn:hover { background: rgba(160,100,80,0.08); }
  #btnRow { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  #shareHint {
    font-size: 10px; color: rgba(160,110,90,0.5);
    letter-spacing: 0.1em; text-align: center; max-width: 280px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <button id="startBtn">マイクを起動する</button>
  <div id="volumeBar"><div id="volumeFill"></div></div>
  <div id="flowerCount">🌹 <span id="countNum">0</span> / 12</div>
  <div id="hint">声を出すとバラが咲きます</div>
</div>

<div id="bouquetModal">
  <div id="modalTitle">✦ 花束が完成しました ✦</div>
  <div id="poemBox"><div id="poemLoading">詩を紡いでいます...</div></div>
  <div id="btnRow">
    <button class="modal-btn" id="shareBtn">📋 詩をコピーして贈る</button>
    <button class="modal-btn" id="restartBtn">もう一度咲かせる</button>
  </div>
  <div id="shareHint">コピーした詩をLINEやメッセージで<br>大切な人に送ってみてください</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const volumeBar = document.getElementById('volumeBar');
const volumeFill = document.getElementById('volumeFill');
const flowerCountEl = document.getElementById('flowerCount');
const countNumEl = document.getElementById('countNum');
const bouquetModal = document.getElementById('bouquetModal');
const poemBox = document.getElementById('poemBox');
const shareBtn = document.getElementById('shareBtn');
const restartBtn = document.getElementById('restartBtn');

let width, height, analyser, dataArray;
let volume = 0, smoothVolume = 0;
let baseHue = Math.random() * 360;
let isRunning = false;
let flowerCount = 0;
const TARGET = 12;
let voiceLog = [];
let currentPoem = '';
let bouquetShown = false;
let lastFlowerTime = 0;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  ctx.fillStyle = 'hsla(30, 20%, 97%, 1)';
  ctx.fillRect(0, 0, width, height);
}
window.addEventListener('resize', resize);
resize();

startBtn.addEventListener('click', async () => {
  if (isRunning) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    isRunning = true;
    startBtn.textContent = '🎤 聴いています';
    startBtn.classList.add('active');
    volumeBar.style.display = 'block';
    flowerCountEl.style.display = 'block';
    loop();
  } catch (e) {
    startBtn.textContent = 'マイクを許可してください';
  }
});

function getVolume() {
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
  return sum / dataArray.length / 255;
}

function loop() {
  requestAnimationFrame(loop);
  volume = getVolume();
  smoothVolume += (volume - smoothVolume) * 0.2;
  volumeFill.style.width = Math.min(smoothVolume * 400, 100) + '%';

  ctx.fillStyle = 'hsla(30, 20%, 97%, 0.008)';
  ctx.fillRect(0, 0, width, height);

  if (smoothVolume > 0.03 && !bouquetShown) {
    baseHue = (baseHue + smoothVolume * 200) % 360;
    const now = Date.now();
    if (now - lastFlowerTime > 320) {
      lastFlowerTime = now;
      const x = Math.random() * width;
      const y = Math.random() * height * 0.82;
      const size = map(smoothVolume, 0.03, 0.4, 35, 150) * (0.7 + Math.random() * 1.2);
      drawRose(x, y, size, baseHue, smoothVolume);
      voiceLog.push({ volume: smoothVolume, hue: baseHue });
      flowerCount++;
      countNumEl.textContent = flowerCount;
      if (flowerCount >= TARGET) {
        bouquetShown = true;
        setTimeout(showBouquet, 800);
      }
    }
  }
}

function drawRose(x, y, s, h, v) {
  ctx.save();
  ctx.translate(x, y);
  const layers = Math.floor(map(v, 0.03, 0.4, 3, 7));
  for (let layer = 0; layer < layers; layer++) {
    const petalsInLayer = 5 + layer * 2;
    const layerRadius = s * 0.15 * (layer + 1);
    const offset = layer * 0.4;
    for (let p = 0; p < petalsInLayer; p++) {
      const angle = (p / petalsInLayer) * Math.PI * 2 + offset;
      const px = Math.cos(angle) * layerRadius * 0.5;
      const py = Math.sin(angle) * layerRadius * 0.5;
      const pH = (h + layer * 8 + p * 2) % 360;
      const sat = map(layer, 0, layers, 85, 45);
      const bri = map(layer, 0, layers, 55, 82);
      const alpha = map(layer, 0, layers, 0.7, 0.25);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle + Math.PI / 2);
      const pw = layerRadius * map(layer, 0, layers, 0.55, 0.75);
      const ph2 = pw * map(layer, 0, layers, 1.6, 1.2);
      ctx.beginPath();
      ctx.moveTo(0, -ph2/2);
      ctx.bezierCurveTo( pw/2,-ph2/4,  pw/2, ph2/4, 0, ph2/2);
      ctx.bezierCurveTo(-pw/2, ph2/4, -pw/2,-ph2/4, 0,-ph2/2);
      ctx.fillStyle = `hsla(${pH},${sat}%,${bri}%,${alpha})`;
      ctx.strokeStyle = `hsla(${pH},${sat-10}%,${bri-15}%,${alpha*0.4})`;
      ctx.lineWidth = 0.6;
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${(h+30)%360},70%,75%,0.9)`;
  ctx.fill();
  ctx.restore();
}

async function showBouquet() {
  bouquetModal.classList.add('show');

  const avgVol = voiceLog.reduce((s, l) => s + l.volume, 0) / voiceLog.length;
  const hues = voiceLog.map(l => Math.round(l.hue));
  const dominantHue = hues[Math.floor(hues.length / 2)];

  let voiceCharacter =
    avgVol < 0.06  ? 'とても静かで繊細な、ささやくような声' :
    avgVol < 0.12  ? '穏やかで優しい声' :
    avgVol < 0.2   ? '温かみのある、しっかりとした声' :
                     '力強く情熱的な声';

  let colorMood =
    dominantHue < 30 || dominantHue > 330 ? '赤いバラ色の情熱' :
    dominantHue < 80  ? '黄金色の光' :
    dominantHue < 160 ? '緑の静けさ' :
    dominantHue < 220 ? '青い空の広がり' :
    dominantHue < 280 ? '紫の夢' : 'ピンクの優しさ';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `あなたは詩人です。以下の声の記録から、2〜3行の短い日本語の詩を一つだけ作ってください。

声の特徴：${voiceCharacter}
声が生み出した色：${colorMood}
咲いたバラの数：${flowerCount}輪

ルール：
- 2〜3行のみ。余計な説明は不要。
- 詩だけを返してください。タイトルも不要。
- 美しく、誰かに贈りたくなるような言葉で。
- 声を出した人の内側にある何かを映すような詩に。`
        }]
      })
    });
    const data = await res.json();
    currentPoem = data.content?.[0]?.text?.trim() || defaultPoem();
  } catch {
    currentPoem = defaultPoem();
  }

  poemBox.innerHTML = currentPoem.replace(/\n/g, '<br>');
}

function defaultPoem() {
  return 'あなたの声が\nここで花になった\nそっと、誰かに届きますように';
}

shareBtn.addEventListener('click', () => {
  if (!currentPoem) return;
  const text = `🌹 花のセレナーデ\n\n${currentPoem}\n\nhttps://hanano-serenade.vercel.app`;
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  shareBtn.textContent = '✓ コピーしました';
  setTimeout(() => shareBtn.textContent = '📋 詩をコピーして贈る', 2500);
});

restartBtn.addEventListener('click', () => {
  bouquetModal.classList.remove('show');
  bouquetShown = false; flowerCount = 0; voiceLog = []; currentPoem = '';
  countNumEl.textContent = 0;
  poemBox.innerHTML = '<div id="poemLoading" style="font-size:11px;letter-spacing:0.2em;color:rgba(160,110,90,0.6);animation:pulse 1.5s infinite">詩を紡いでいます...</div>';
  ctx.fillStyle = 'hsla(30, 20%, 97%, 1)';
  ctx.fillRect(0, 0, width, height);
  baseHue = Math.random() * 360;
});

function map(v, a, b, c, d) { return c + (d-c)*((v-a)/(b-a)); }
</script>
</body>
</html>
